name: Backport
on:
  pull_request_target:
    types:
      - closed
      - labeled

jobs:
  backport:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    name: Backport
    steps:
      - name: GitHub App token
        id: github_app_token
        uses: tibdex/github-app-token@918e03f91c95714f3d75f0140b3a5c5f738300df # v1.5.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          installation_id: 22958780

      - name: Backport
        uses: VachaShah/backport@9a40eac1688e31d6e292dec8e81b6aee7347c256 # v2.2.0
        with:
          github_token: ${{ steps.github_app_token.outputs.token }}
          branch_name: backport/backport-${{ github.event.number }}
          labels_template: "<%= JSON.stringify([...labels, 'autocut']) %>"
          failure_labels: "failed backport"
